services:
  db:
    image: postgres:17
    container_name: social_account_manager_db
    volumes:
      - ./database:/var/lib/postgresql/data
    networks:
      - db
    ports:
      - "5333:5432"
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"']
      interval: 60s
      timeout: 5s
      retries: 5
    restart: always
    env_file:
      - .env

networks:
  db:
